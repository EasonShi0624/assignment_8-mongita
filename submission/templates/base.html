<!DOCTYPE html>
<html>
  <head>
    <title>Treble Clef</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  </head>
  <body>
    <header>
      <div id="leftHeader">
        <a href="{{ url_for('home') }}">
          <img src="{{ url_for('static', filename='images/misc/treble-clef-logo.jpg') }}" alt="Treble Clef logo">
        </a>
      </div>

      <div id="midHeader">
        <div id="headerLinks">
          <a class="commandButton" href="{{ url_for('home') }}">Home</a>
          <a class="commandButton" href="{{ url_for('read') }}">View Books</a>
          <a class="commandButton" href="{{ url_for('create') }}">Add Book</a>
        </div>

        {% if categories is defined %}
        <div class="dropdown">
          <p class="dropdownSelect">Select Category</p>
          <div class="dropdownContent">
            {% for category in categories %}
              <p>
                <a href="{{ url_for('read', categoryId=category['id']) }}">
                  {{ category['name'] }}
                </a>
              </p>
            {% endfor %}
          </div>
        </div>
        {% endif %}
      </div>

      <div id="rightHeader">
        <div id="cartCount">Mongita CRUD</div>
      </div>
    </header>

    {% block container %}{% endblock %}

    <footer>
      <div id="footerLeft">
        <p>The Treble Clef</p>
        <p>&copy;</p>
        <a href="{{ url_for('read') }}">View Books</a>
        <a href="{{ url_for('create') }}">Add Book</a>
      </div>
      <div id="footerRight">
        <a href="#"><img src="{{ url_for('static', filename='images/misc/facebook-icon.jpg') }}" alt="Facebook"></a>
        <a href="#"><img src="{{ url_for('static', filename='images/misc/twitter-icon.jpg') }}" alt="Twitter"></a>
      </div>
    </footer>
  </body>
</html>
